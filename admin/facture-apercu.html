<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axe Dossier — Aperçu facture</title>
  <style>
    :root{
      --bg:#f3efe8;
      --card:#ffffff;
      --text:#171717;
      --muted:#66615a;
      --line:rgba(23,23,23,0.08);
      --accent:#111111;
      --soft:#e9e1d4;
      --shadow:0 16px 40px rgba(0,0,0,0.06);
      --max:1100px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(243,239,232,0.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
    }

    .topbar-inner{
      width:min(var(--max),calc(100% - 32px));
      margin:0 auto;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      letter-spacing:.02em;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:var(--accent);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:44px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      text-decoration:none;
      font:inherit;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .btn-dark{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .wrap{
      width:min(var(--max),calc(100% - 32px));
      margin:28px auto 56px;
    }

    .sheet{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:34px;
    }

    .header{
      display:grid;
      grid-template-columns:1.3fr 1fr;
      gap:24px;
      align-items:start;
      margin-bottom:28px;
    }

    .title{
      font-size:2rem;
      font-weight:900;
      letter-spacing:-.05em;
      margin-bottom:8px;
    }

    .muted{color:var(--muted)}
    .block{
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      background:#fcfbf8;
    }

    .block h2{
      margin:0 0 10px;
      font-size:1rem;
      letter-spacing:-.02em;
    }

    .meta{
      display:grid;
      gap:6px;
      font-size:.97rem;
      line-height:1.5;
    }

    .section{
      margin-top:18px;
    }

    .label{
      font-size:.86rem;
      font-weight:800;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:#4f4942;
      margin-bottom:8px;
    }

    .desc{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      margin-top:14px;
    }

    .desc table{
      width:100%;
      border-collapse:collapse;
    }

    .desc th,
    .desc td{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }

    .desc th{
      background:#faf7f1;
      font-size:.9rem;
    }

    .desc tr:last-child td{border-bottom:none}

    .totals{
      margin-top:18px;
      margin-left:auto;
      width:min(100%,420px);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fcfbf8;
    }

    .totals-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
    }

    .totals-row:last-child{border-bottom:none}
    .totals-row strong{font-size:1.06rem}
    .grand-total{
      background:#f3eee6;
      font-weight:900;
    }

    .footer-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:20px;
    }

    .bank{
      white-space:pre-line;
      line-height:1.55;
    }

    .status-badge{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:0 12px;
      border-radius:999px;
      background:var(--soft);
      border:1px solid var(--line);
      font-size:.82rem;
      font-weight:700;
    }

    .empty,
    .error{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px;
    }

    .error{color:#7a1f1f}

    @media (max-width: 860px){
      .header,
      .footer-grid{
        grid-template-columns:1fr;
      }

      .sheet{padding:22px}
    }

    @media print{
      body{background:#fff}
      .topbar{display:none !important}
      .wrap{width:100%;margin:0}
      .sheet{
        box-shadow:none;
        border:none;
        border-radius:0;
        padding:0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">AD</span>
        <span>Axe Dossier · Aperçu facture</span>
      </div>

      <div class="actions">
        <a class="btn" href="factures.html">Retour</a>
        <button class="btn btn-dark" id="printBtn" type="button">Imprimer / PDF</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="loading" class="empty">Chargement de la facture…</div>
    <div id="error" class="error" style="display:none;"></div>

    <article id="sheet" class="sheet" style="display:none;">
      <section class="header">
        <div>
          <div class="title">Facture</div>
          <div class="meta">
            <div><strong id="invoiceNumber">—</strong></div>
            <div>Date : <span id="invoiceDate">—</span></div>
            <div>Échéance : <span id="invoiceDueDate">—</span></div>
            <div>Statut : <span id="invoiceStatus" class="status-badge">—</span></div>
          </div>
        </div>

        <div class="block">
          <h2>Émetteur</h2>
          <div id="businessBlock" class="meta"></div>
        </div>
      </section>

      <section class="footer-grid">
        <div class="block">
          <h2>Client</h2>
          <div id="clientBlock" class="meta"></div>
        </div>

        <div class="block">
          <h2>Références</h2>
          <div id="refsBlock" class="meta"></div>
        </div>
      </section>

      <section class="section">
        <div class="label">Objet</div>
        <div class="desc">
          <table>
            <thead>
              <tr>
                <th style="width:65%;">Désignation</th>
                <th style="width:15%;">TVA</th>
                <th style="width:20%;">Montant</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td id="invoiceLabel">—</td>
                <td id="invoiceVatCell">—</td>
                <td id="invoiceAmountCell">—</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="totals">
          <div class="totals-row">
            <span>Total HT</span>
            <strong id="amountHT">—</strong>
          </div>
          <div class="totals-row">
            <span>TVA</span>
            <strong id="amountVAT">—</strong>
          </div>
          <div class="totals-row grand-total">
            <span>Total TTC</span>
            <strong id="amountTTC">—</strong>
          </div>
        </div>
      </section>

      <section class="footer-grid">
        <div class="block">
          <h2>Mentions</h2>
          <div id="mentionsBlock" class="meta"></div>
        </div>

        <div class="block">
          <h2>Coordonnées bancaires</h2>
          <div id="bankBlock" class="bank muted">Non renseignées.</div>
        </div>
      </section>

      <section class="section">
        <div class="block">
          <h2>Notes internes</h2>
          <div id="notesBlock" class="meta muted">Aucune note.</div>
        </div>
      </section>
    </article>
  </main>

  <script type="module">
    import "./auth-guard.js";
    import { db } from "./firebase-config.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const sheetEl = document.getElementById("sheet");
    const printBtn = document.getElementById("printBtn");

    function qs(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function escapeHtml(text = "") {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      return num.toLocaleString("fr-FR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + " €";
    }

    function line(text) {
      return `<div>${escapeHtml(text)}</div>`;
    }

    function renderBusiness(snapshot = {}) {
      const parts = [
        snapshot.businessName || "",
        snapshot.ownerName || "",
        snapshot.legalForm || "",
        snapshot.address || "",
        snapshot.email || "",
        snapshot.phone || "",
        snapshot.siret ? `SIRET : ${snapshot.siret}` : "",
        snapshot.ape ? `APE : ${snapshot.ape}` : "",
        snapshot.vatMode === "YES" && snapshot.vatNumber ? `TVA : ${snapshot.vatNumber}` : ""
      ].filter(Boolean);

      return parts.length
        ? parts.map(p => line(p.replace(/\n/g, " "))).join("")
        : '<div class="muted">Aucune donnée émetteur.</div>';
    }

    function renderClient(snapshot = {}) {
      const parts = [
        snapshot.name || "",
        snapshot.type || "",
        snapshot.address || "",
        snapshot.email || "",
        snapshot.phone || ""
      ].filter(Boolean);

      return parts.length
        ? parts.map(p => line(p.replace(/\n/g, " "))).join("")
        : '<div class="muted">Aucune donnée client.</div>';
    }

    function renderRefs(data = {}) {
      const parts = [
        data.dossierId ? `Dossier lié : ${data.dossierId}` : "Aucun dossier lié",
        data.mode ? `Mode prévu : ${data.mode}` : "",
        data.status ? `Statut : ${data.status}` : ""
      ].filter(Boolean);

      return parts.map(p => line(p)).join("");
    }

    function renderMentions(snapshot = {}) {
      const parts = [];

      if (snapshot.vatMode === "YES") {
        parts.push(`Soumis à la TVA${snapshot.vatRate ? ` : ${snapshot.vatRate} %` : ""}`);
        if (snapshot.vatNumber) parts.push(`N° TVA : ${snapshot.vatNumber}`);
      } else {
        parts.push(snapshot.tvaExemptionText || "TVA non applicable, art. 293 B du CGI");
      }

      if (snapshot.legalNotice) parts.push(snapshot.legalNotice);

      return parts.length
        ? parts.map(p => line(p)).join("")
        : '<div class="muted">Aucune mention.</div>';
    }

    function renderBank(snapshot = {}) {
      const parts = [];
      if (snapshot.iban) parts.push(`IBAN : ${snapshot.iban}`);
      if (snapshot.bic) parts.push(`BIC : ${snapshot.bic}`);

      return parts.length ? escapeHtml(parts.join("\n")) : "Non renseignées.";
    }

    function showError(message) {
      loadingEl.style.display = "none";
      sheetEl.style.display = "none";
      errorEl.style.display = "block";
      errorEl.textContent = message;
    }

    async function init() {
      const invoiceId = qs("id");

      if (!invoiceId) {
        showError("Aucun identifiant de facture dans l’URL.");
        return;
      }

      try {
        const snap = await getDoc(doc(db, "factures", invoiceId));

        if (!snap.exists()) {
          showError("Facture introuvable.");
          return;
        }

        const data = snap.data();
        const business = data.businessSnapshot || {};
        const client = data.clientSnapshot || {};

        document.getElementById("invoiceNumber").textContent = data.number || "—";
        document.getElementById("invoiceDate").textContent = data.date || "—";
        document.getElementById("invoiceDueDate").textContent = data.dueDate || "—";
        document.getElementById("invoiceStatus").textContent = data.status || "—";

        document.title = `${data.number || "Facture"} — Axe Dossier`;

        document.getElementById("businessBlock").innerHTML = renderBusiness(business);
        document.getElementById("clientBlock").innerHTML = renderClient(client);
        document.getElementById("refsBlock").innerHTML = renderRefs(data);

        document.getElementById("invoiceLabel").textContent = data.label || "Prestation";
        document.getElementById("invoiceVatCell").textContent =
          business.vatMode === "YES"
            ? `${Number(business.vatRate || 0)} %`
            : "Non applicable";

        document.getElementById("invoiceAmountCell").textContent =
          formatMoney(data.amountTTC ?? data.amount ?? 0);

        document.getElementById("amountHT").textContent =
          formatMoney(data.amountHT ?? data.amountTTC ?? data.amount ?? 0);

        document.getElementById("amountVAT").textContent =
          formatMoney(data.amountVAT ?? 0);

        document.getElementById("amountTTC").textContent =
          formatMoney(data.amountTTC ?? data.amount ?? 0);

        document.getElementById("mentionsBlock").innerHTML = renderMentions(business);
        document.getElementById("bankBlock").textContent = renderBank(business);

        document.getElementById("notesBlock").innerHTML = data.notes
          ? `<div>${escapeHtml(data.notes).replace(/\n/g, "<br>")}</div>`
          : "Aucune note.";

        loadingEl.style.display = "none";
        errorEl.style.display = "none";
        sheetEl.style.display = "block";
      } catch (err) {
        console.error(err);
        showError("Impossible de charger la facture.");
      }
    }

    printBtn.addEventListener("click", () => window.print());

    init();
  </script>
</body>
</html>
