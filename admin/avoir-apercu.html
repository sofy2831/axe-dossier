<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Axe Dossier — Aperçu avoir</title>

<style>
body{font-family:Inter,sans-serif;background:#f3efe8;margin:0}
.wrap{max-width:1100px;margin:auto;padding:20px}

.sheet{
  background:#fff;
  border-radius:20px;
  padding:20px;
  border:1px solid #ddd;
}

.grid-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.box{
  border:1px solid #ddd;
  border-radius:14px;
  padding:12px;
}

.logo{
  height:100px;
  display:flex;
  align-items:center;
}

.logo img{
  max-height:100%;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border-bottom:1px solid #ddd;
  padding:10px;
}

.right{text-align:right}

.total{
  margin-top:20px;
  width:300px;
  margin-left:auto;
}

.print{
  position:fixed;
  top:10px;
  right:10px;
}

@media print{
  body{background:#fff}
  .print{display:none}
}
</style>
</head>

<body>

<button class="print" onclick="window.print()">Imprimer</button>

<div class="wrap">
<div class="sheet">

<div class="grid-top">

<div class="box logo" id="logoBox"></div>

<div class="box">
<h2 id="number"></h2>
<div id="date"></div>
</div>

<div class="box" id="business"></div>
<div class="box" id="client"></div>

</div>

<table>
<thead>
<tr>
<th>Désignation</th>
<th class="right">Qté</th>
<th class="right">PU</th>
<th class="right">Total</th>
</tr>
</thead>
<tbody id="lines"></tbody>
</table>

<div class="total">
<div>Total : <strong id="total"></strong></div>
</div>

<div style="margin-top:20px" id="notes"></div>

</div>
</div>

<script type="module">
import "./auth-guard.js";
import { db } from "./firebase-config.js";
import { doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const id=new URLSearchParams(window.location.search).get("id");

function money(v){
  return Number(v||0).toFixed(2)+" €";
}

const snap=await getDoc(doc(db,"avoirs",id));
const data=snap.data();

document.getElementById("number").textContent=data.number;
document.getElementById("date").textContent=data.date;

document.getElementById("business").innerHTML=
data.businessSnapshot?.businessName||"";

document.getElementById("client").innerHTML=
data.clientSnapshot?.name||"";

document.getElementById("lines").innerHTML=
data.lines.map(l=>`
<tr>
<td>${l.designation}</td>
<td class="right">${l.qty}</td>
<td class="right">${money(l.price)}</td>
<td class="right">${money(l.total)}</td>
</tr>
`).join("");

document.getElementById("total").textContent=money(data.total);

document.getElementById("notes").textContent=data.notes||"";

</script>

</body>
</html>
