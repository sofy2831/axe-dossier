<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axe Dossier — Admin</title>
  <style>
    :root{
      --bg:#f3efe8;
      --card:#ffffff;
      --text:#171717;
      --muted:#66615a;
      --line:rgba(23,23,23,0.08);
      --accent:#111111;
      --soft:#faf7f1;
      --shadow:0 16px 40px rgba(0,0,0,0.06);
      --max:1080px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(var(--max),calc(100% - 32px));
      margin:0 auto;
      padding:40px 0 56px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    h1,h2,h3,p{margin:0}

    h1{
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:-.05em;
      margin-bottom:10px;
    }

    h2{
      font-size:1.3rem;
      letter-spacing:-.02em;
    }

    h3{
      font-size:1rem;
      letter-spacing:-.02em;
      margin-bottom:12px;
    }

    p{
      color:var(--muted);
      line-height:1.55;
    }

    .stack{
      display:grid;
      gap:20px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:.92rem;
      font-weight:700;
      margin-bottom:6px;
    }

    .field input{
      width:100%;
      min-height:48px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      font:inherit;
      background:#fff;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn,
    .menu a{
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid var(--accent);
      background:var(--accent);
      color:#fff;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .btn-secondary{
      background:#fff;
      color:var(--accent);
      border-color:var(--line);
    }

    .hidden{
      display:none !important;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      font-size:.92rem;
      display:none;
    }

    .status.show{display:block}

    .status.error{
      background:#f7e3df;
      color:#6b241f;
      border:1px solid rgba(23,23,23,0.08);
    }

    .status.ok{
      background:#e8efe4;
      color:#304127;
      border:1px solid rgba(23,23,23,0.08);
    }

    .topline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .muted{
      color:var(--muted);
      font-size:.94rem;
    }

    .admin-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .admin-block{
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--soft);
      padding:18px;
    }

    .menu{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .menu a{
      background:#fff;
      color:var(--accent);
      border-color:var(--line);
      justify-content:flex-start;
      padding:12px 16px;
      min-height:52px;
    }

    .menu a:hover{
      border-color:var(--accent);
    }

    @media (max-width: 900px){
      .admin-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:720px){
      .menu{
        grid-template-columns:1fr;
      }
      .actions .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stack">
      <section class="card">
        <h1>Admin Axe Dossier</h1>
        <p>Connexion privée au back-office.</p>
      </section>

      <section id="loginCard" class="card">
        <h2 style="margin-bottom:14px;">Connexion</h2>
        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" required autocomplete="username" />
          </div>

          <div class="field">
            <label for="password">Mot de passe</label>
            <input id="password" type="password" required autocomplete="current-password" />
          </div>

          <div class="actions">
            <button type="submit" class="btn">Se connecter</button>
          </div>
        </form>

        <div id="loginStatus" class="status"></div>
      </section>

      <section id="adminCard" class="card hidden">
        <div class="topline">
          <div>
            <h2>Back-office</h2>
            <div id="userInfo" class="muted"></div>
          </div>
          <button id="logoutBtn" class="btn btn-secondary" type="button">Déconnexion</button>
        </div>

        <div class="admin-grid">
          <div class="admin-block">
            <h3>Structure du dossier</h3>
            <div class="menu">
              <a href="clients.html">Clients</a>
              <a href="dossiers.html">Dossiers</a>
              <a href="documents.html">Documents</a>
            </div>
          </div>

          <div class="admin-block">
            <h3>Documents commerciaux</h3>
            <div class="menu">
              <a href="devis.html">Devis</a>
              <a href="factures.html">Factures</a>
              <a href="avoirs.html">Avoirs</a>
            </div>
          </div>

          <div class="admin-block">
            <h3>Encaissement & suivi</h3>
            <div class="menu">
              <a href="paiements.html">Paiements</a>
              <a href="recouvrement.html">Recouvrement</a>
            </div>
          </div>

          <div class="admin-block">
            <h3>Journaux & réglages</h3>
            <div class="menu">
              <a href="journal-ventes.html">Journal des ventes</a>
              <a href="journal-reglements.html">Journal des règlements</a>
              <a href="reglages.html">Réglages</a>
            </div>
          </div>
        </div>

        <div id="adminStatus" class="status"></div>
      </section>
    </div>
  </div>

  <script type="module">
    import { login, logout, watchAuth } from "./firebase-auth.js";

    const loginCard = document.getElementById("loginCard");
    const adminCard = document.getElementById("adminCard");
    const loginForm = document.getElementById("loginForm");
    const loginStatus = document.getElementById("loginStatus");
    const adminStatus = document.getElementById("adminStatus");
    const userInfo = document.getElementById("userInfo");
    const logoutBtn = document.getElementById("logoutBtn");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    function showStatus(el, message, type = "ok") {
      el.className = `status show ${type}`;
      el.textContent = message;
    }

    function clearStatus(el) {
      el.className = "status";
      el.textContent = "";
    }

    function resetLoginForm() {
      loginForm.reset();
      passwordInput.value = "";
    }

    function setLoggedOut(message = "") {
      loginCard.classList.remove("hidden");
      adminCard.classList.add("hidden");
      userInfo.textContent = "";
      clearStatus(adminStatus);
      passwordInput.value = "";

      if (message) {
        showStatus(loginStatus, message, "ok");
      }
    }

    function setLoggedIn(user) {
      loginCard.classList.add("hidden");
      adminCard.classList.remove("hidden");
      userInfo.textContent = user?.email || "";
      clearStatus(loginStatus);
      clearStatus(adminStatus);
      passwordInput.value = "";
    }

    watchAuth((user) => {
      if (user) {
        setLoggedIn(user);
      } else {
        setLoggedOut();
      }
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus(loginStatus);

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      try {
        await login(email, password);
      } catch (err) {
        console.error(err);
        showStatus(loginStatus, "Connexion refusée. Vérifie l’email et le mot de passe.", "error");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await logout();
        resetLoginForm();
        setLoggedOut("Déconnexion effectuée.");
      } catch (err) {
        console.error(err);
        showStatus(adminStatus, "Impossible de se déconnecter.", "error");
      }
    });
  </script>
</body>
</html>
