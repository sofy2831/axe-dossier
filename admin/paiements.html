<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Axe Dossier — Paiements</title>

<style>
/* ⚠️ TON CSS ORIGINAL CONSERVÉ — aucune modif */
:root{
  --bg:#f3efe8;
  --card:#ffffff;
  --text:#171717;
  --muted:#66615a;
  --line:rgba(23,23,23,0.08);
  --accent:#111111;
  --soft:#e9e1d4;
  --radius:18px;
  --shadow:0 16px 40px rgba(0,0,0,0.06);
  --max:1180px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
.wrap{width:min(var(--max),calc(100% - 32px));margin:0 auto}
.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line)}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:20px}
.btn{background:#111;color:#fff;border:none;padding:10px 14px;border-radius:999px;cursor:pointer}
.btn-secondary{background:#fff;color:#111;border:1px solid var(--line)}
.payment-item{border:1px solid var(--line);padding:12px;border-radius:12px;margin-bottom:10px}
</style>
</head>

<body>

<header class="topbar">
  <div class="wrap topbar-inner">
    <strong>Axe Dossier · Paiements</strong>
    <nav>
      <a href="factures.html">Factures</a>
      <a href="avoirs.html">Avoirs</a>
      <a href="paiements.html">Paiements</a>
    </nav>
  </div>
</header>

<main class="wrap">

<div class="grid">

<!-- FORM -->
<div class="card">
<h2>Ajouter un paiement</h2>

<form id="form">

<label>Facture</label>
<select id="invoice" required></select>

<label>Date</label>
<input type="date" id="date">

<label>Montant</label>
<input type="number" id="amount" step="0.01" required>

<label>Mode</label>
<select id="mode">
<option value="VIREMENT">VIREMENT</option>
<option value="CHEQUE">CHEQUE</option>
<option value="ESPECES">ESPECES</option>
</select>

<label>Référence</label>
<input id="ref">

<label>Notes</label>
<textarea id="notes"></textarea>

<div style="margin-top:10px">
<button class="btn">Enregistrer</button>
<button type="button" id="reset" class="btn btn-secondary">Vider</button>
</div>

</form>
</div>

<!-- LIST -->
<div class="card">
<h2>Liste</h2>
<div id="list"></div>
</div>

</div>
</main>

<script type="module">
import { db } from "./firebase-config.js";
import {
collection, addDoc, deleteDoc, doc, updateDoc,
onSnapshot, query, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---------------- DATA ---------------- */

const invoicesRef = collection(db,"factures");
const paymentsRef = collection(db,"paiements");
const creditsRef = collection(db,"avoirs");

let invoices=[], payments=[], credits=[];
let editId=null;

/* ---------------- HELPERS ---------------- */

const money=v=>Number(v||0).toFixed(2)+" €";

const creditsTotal=id =>
credits.filter(a=>a.invoiceId===id && a.status!=="ANNULE")
.reduce((s,a)=>s+(a.amountTTC||0),0);

const paymentsTotal=(id,exclude=null)=>
payments.filter(p=>p.invoiceId===id && p.id!==exclude)
.reduce((s,p)=>s+(p.amount||0),0);

const remaining=(id,exclude=null)=>{
const inv=invoices.find(i=>i.id===id);
if(!inv)return 0;
return Math.max(0,(inv.amountTTC||0)-creditsTotal(id)-paymentsTotal(id,exclude));
};

/* ---------------- SELECT ---------------- */

function fillSelect(){
const el=document.getElementById("invoice");

el.innerHTML='<option value="">Choisir</option>'+
invoices.map(i=>{
const r=remaining(i.id,editId);
return `<option value="${i.id}" data-rem="${r}">
${i.number} — reste ${money(r)}
</option>`;
}).join("");
}

/* ---------------- RESET ---------------- */

function resetForm(){
document.getElementById("form").reset();
document.getElementById("mode").value="VIREMENT";
editId=null;
fillSelect();
}

/* ---------------- PAYLOAD ---------------- */

function payload(){
const id=document.getElementById("invoice").value;
const inv=invoices.find(i=>i.id===id);

return{
invoiceId:id,
invoiceNumberSnapshot:inv?.number||"",
clientNameSnapshot:inv?.clientSnapshot?.name||"",
invoiceAmountSnapshot:inv?.amountTTC||0,
businessSnapshot:inv?.businessSnapshot||{},

date:document.getElementById("date").value,
amount:Number(document.getElementById("amount").value),
mode:document.getElementById("mode").value,
reference:document.getElementById("ref").value,
notes:document.getElementById("notes").value,

createdAt:serverTimestamp(),
updatedAt:serverTimestamp()
};
}

/* ---------------- RENDER ---------------- */

function render(){

const list=document.getElementById("list");

if(!payments.length){
list.innerHTML="Aucun paiement";
return;
}

list.innerHTML=payments.map(p=>{
const r=remaining(p.invoiceId);

return `
<div class="payment-item">
<strong>${p.invoiceNumberSnapshot}</strong><br>
${p.clientNameSnapshot}<br>
Montant : ${money(p.amount)}<br>
Reste : ${money(r)}<br>

<button data-edit="${p.id}">Modifier</button>
<button data-del="${p.id}">Supprimer</button>
</div>
`;
}).join("");
}

/* ---------------- EVENTS ---------------- */

document.getElementById("form").addEventListener("submit",async e=>{
e.preventDefault();

const data=payload();
const max=remaining(data.invoiceId,editId);

if(data.amount>max){
alert("Montant trop élevé");
return;
}

if(editId){
await updateDoc(doc(db,"paiements",editId),data);
}else{
await addDoc(paymentsRef,data);
}

resetForm();
});

document.getElementById("reset").onclick=resetForm;

document.getElementById("list").onclick=async e=>{

if(e.target.dataset.del){
await deleteDoc(doc(db,"paiements",e.target.dataset.del));
if(editId===e.target.dataset.del) resetForm();
}

if(e.target.dataset.edit){
const p=payments.find(x=>x.id===e.target.dataset.edit);
editId=p.id;

document.getElementById("invoice").value=p.invoiceId;
document.getElementById("amount").value=p.amount;
document.getElementById("date").value=p.date;
}
};

/* ---------------- FIRESTORE ---------------- */

onSnapshot(query(invoicesRef),s=>{
invoices=s.docs.map(d=>({id:d.id,...d.data()}));
fillSelect();
render();
});

onSnapshot(query(paymentsRef),s=>{
payments=s.docs.map(d=>({id:d.id,...d.data()}));
render();
});

onSnapshot(query(creditsRef),s=>{
credits=s.docs.map(d=>({id:d.id,...d.data()}));
render();
});

</script>

</body>
</html>
